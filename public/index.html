<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLM-5 Pro | الذكاء الاصطناعي المتطور</title>
    <meta name="description" content="GLM-5 Pro - تجربة دردشة ذكية متطورة مع دعم الصور وإنشاء المواقع">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                    <span>GLM-5 Pro</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>محادثة جديدة</span>
                </button>
            </div>
            
            <div class="sidebar-search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" placeholder="بحث في المحادثات..." id="searchConversations">
            </div>
            
            <div class="conversations-list" id="conversationsList">
                <div class="empty-state" style="text-align: center; padding: 2rem; color: var(--text-secondary);">جاري التحميل...</div>
            </div>
            
            <div class="sidebar-footer">
                <div class="agent-badge">
                    <div class="agent-info">
                        <div class="agent-dot"></div>
                        <span>وضع الوكيل</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="agentToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </aside>
        
        <!-- Sidebar Overlay for Mobile -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        
        <!-- Main Chat Area -->
        <main class="main-content">
            <header class="chat-header">
                <button class="menu-toggle" id="menuToggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="model-info">
                    <span class="model-name">GLM-5</span>
                    <span class="model-badge">Pro</span>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </header>
            
            <div class="chat-container" id="chatContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1>مرحباً بك في GLM-5 Pro</h1>
                    <p>أسألني أي شيء - أنا هنا لمساعدتك</p>
                    <div class="suggestions-grid" id="suggestionsGrid">
                        <!-- Dynamic suggestions will load here -->
                    </div>
                </div>
                
                <!-- Messages Area -->
                <div class="messages-area" id="messagesArea" style="display: none;"></div>
            </div>
            
            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <div class="image-preview-area" id="imagePreviewArea"></div>
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="اكتب رسالتك هنا..." rows="1" maxlength="5000"></textarea>
                        <div class="input-actions">
                            <button class="attach-btn" id="attachBtn" title="إرفاق صورة">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                            </button>
                            <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
                            <button class="send-btn" id="sendBtn">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 2L11 13"/>
                                    <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
                                </svg>
                            </button>
                            <button class="stop-btn" id="stopBtn" style="display: none;">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-footer">
                    <span>GLM-5 يمكنه ارتكاب الأخطاء. تحقق من المعلومات المهمة.</span>
                </div>
            </div>
        </main>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="/script.js"></script>
</body>
</html>
